services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: quality_lab
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d quality_lab"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pipeline
      MINIO_ROOT_PASSWORD: pipeline-secret
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 pipeline pipeline-secret &&
        mc mb --ignore-existing local/pipeline-quality

  quality:
    build:
      context: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: quality_lab
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: pipeline
      MINIO_SECRET_KEY: pipeline-secret
      MINIO_BUCKET: pipeline-quality
      DBT_PROFILES_DIR: /workspace/warehouse
      PYTHONPATH: /workspace/src
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/workspace

volumes:
  postgres-data:
  minio-data:
