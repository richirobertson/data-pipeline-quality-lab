version: 2

models:
  # Dimension tests protect the unique lookup targets referenced by fact rows.
  - name: dim_geography
    columns:
      - {name: geography_key, data_tests: [not_null, unique]}
      - {name: geography_code, data_tests: [not_null, unique]}
      - {name: geography_label, data_tests: [not_null]}
  - name: dim_age
    columns:
      - {name: age_key, data_tests: [not_null, unique]}
      - {name: age_code, data_tests: [not_null, unique]}
      - {name: age_label, data_tests: [not_null]}
  - name: dim_sex
    columns:
      - {name: sex_key, data_tests: [not_null, unique]}
      - {name: sex_code, data_tests: [not_null, unique]}
      - {name: sex_label, data_tests: [not_null]}
