version: 2

models:
  - name: mart_population_by_geography
    description: Demonstration mart containing population totals by source version and geography.
    columns:
      - {name: geography_code, data_tests: [not_null]}
      - {name: geography_label, data_tests: [not_null]}
      - {name: dataset_id, data_tests: [not_null]}
      - {name: edition, data_tests: [not_null]}
      - {name: version, data_tests: [not_null]}
      - {name: population, data_tests: [not_null]}

exposures:
  - name: pipeline_quality_evidence
    label: Pipeline quality evidence report
    type: application
    maturity: medium
    url: https://github.com/richirobertson/data-pipeline-quality-lab
    description: Static evidence generated from source, Spark, and dbt results.
    depends_on:
      - ref('mart_population_by_geography')
    owner:
      name: Rich Robertson
      email: noreply@example.com

